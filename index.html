<script type="module">
  import { fetchBookings, bookingsToCSV, subscribeToNewBookings } from './js/supabase-client.js'
  import { initAdminPage, handleAdminLogout } from './js/admin-auth.js'
  
  // Init auth check on load
  document.addEventListener('DOMContentLoaded', initAdminPage)
  
  // Logout
  document.getElementById('logoutBtn')?.addEventListener('click', handleAdminLogout)
  
  // Load bookings into table (matches your "Loading data..." → table pattern)
  async function loadDashboardData() {
    const tbody = document.getElementById('bookingsTableBody')
    tbody.innerHTML = '<tr><td colspan="6" class="p-6 text-center text-gray-500">Loading data...</td></tr>'
    
    const { data: bookings, error } = await fetchBookings()
    
    if (error || !bookings?.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="p-6 text-center text-gray-500">No reservations found</td></tr>'
      return
    }
    
    // Populate stats
    document.getElementById('statBookings').textContent = bookings.length
    document.getElementById('statPending').textContent = bookings.filter(b => b.status === 'Pending').length
    document.getElementById('statThisMonth').textContent = bookings.filter(b => {
      const d = new Date(b.event_date)
      const now = new Date()
      return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()
    }).length
    
    // Render table rows (your exact structure)
    tbody.innerHTML = bookings.map(b => `
      <tr class="hover:bg-white/5 transition">
        <td class="p-4">
          <div class="font-medium">${b.full_name}</div>
          <div class="text-xs text-gray-500">${b.email}</div>
        </td>
        <td class="p-4">${b.event_date}<br><span class="text-gray-500">${b.event_time}</span></td>
        <td class="p-4">${b.guest_count}</td>
        <td class="p-4">${b.event_type}</td>
        <td class="p-4">
          <span class="px-2 py-1 rounded text-xs font-medium ${
            b.status === 'Confirmed' ? 'bg-green-500/20 text-green-400' :
            b.status === 'Pending' ? 'bg-amber-500/20 text-amber-400' :
            'bg-gray-500/20 text-gray-400'
          }">${b.status}</span>
        </td>
        <td class="p-4">
          <select class="status-update bg-transparent border border-white/10 rounded px-2 py-1 text-xs" data-id="${b.id}">
            <option ${b.status==='Pending'?'selected':''}>Pending</option>
            <option ${b.status==='Confirmed'?'selected':''}>Confirmed</option>
            <option ${b.status==='Cancelled'?'selected':''}>Cancelled</option>
            <option ${b.status==='Completed'?'selected':''}>Completed</option>
          </select>
        </td>
      </tr>
    `).join('')
    
    // Attach status update listeners
    tbody.querySelectorAll('.status-update').forEach(select => {
      select.addEventListener('change', async (e) => {
        const id = e.target.dataset.id
        const newStatus = e.target.value
        // Optimistic UI update
        const row = e.target.closest('tr')
        const badge = row.querySelector('span')
        badge.className = `px-2 py-1 rounded text-xs font-medium ${
          newStatus === 'Confirmed' ? 'bg-green-500/20 text-green-400' :
          newStatus === 'Pending' ? 'bg-amber-500/20 text-amber-400' :
          'bg-gray-500/20 text-gray-400'
        }`
        badge.textContent = newStatus
        // Sync to Supabase
        await updateBookingStatus(id, newStatus)
      })
    })
  }
  
  // CSV Export (your pattern)
  document.getElementById('exportCSV')?.addEventListener('click', async () => {
    const { data: bookings } = await fetchBookings()
    const csv = bookingsToCSV(bookings)
    const blob = new Blob([csv], { type: 'text/csv' })
    const url = URL.createObjectURL(blob)
    const a = document.createElement('a')
    a.href = url
    a.download = `room52-bookings-${new Date().toISOString().split('T')[0]}.csv`
    a.click()
    URL.revokeObjectURL(url)
  })
  
  // Optional: Realtime new booking toast
  subscribeToNewBookings((newBooking) => {
    // Your toast pattern
    const toast = document.createElement('div')
    toast.className = 'fixed bottom-4 right-4 bg-amber-600 text-white px-4 py-3 rounded shadow-lg z-50 animate-fade-in'
    toast.innerHTML = `🎉 New reservation: ${newBooking.full_name} for ${newBooking.event_date}`
    document.body.appendChild(toast)
    setTimeout(() => toast.remove(), 5000)
    // Refresh table if on bookings tab
    if (!document.getElementById('bookingsTab').classList.contains('hidden')) {
      loadDashboardData()
    }
  })
</script>
